# Cloudflare Tunnel config for HUMA Studio
# → 상세 설정은 deploy/cloudflare-tunnel.yml 및 deploy/setup-cloudflare-tunnel.sh 참고

tunnel: huma-studio
credentials-file: /etc/cloudflared/huma-studio.json

ingress:
  - hostname: api.huma.yourdomain.com
    service: http://127.0.0.1:3100
  - service: http_status:404
