<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>HUMA VNC HUD</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: ui-monospace, 'Consolas', monospace;
      user-select: none;
      pointer-events: none;
      overflow: hidden;
    }
    #bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      justify-content: space-between;
      gap: 0;
      padding: 0;
      background: rgba(8, 6, 14, 0.88);
      border-top: 1px solid rgba(255, 255, 255, 0.14);
      color: #e8e4dc;
      font-size: 11px;
      line-height: 1.35;
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.45);
    }
    #mode {
      flex: 0 0 100%;
      padding: 6px 12px 4px;
      font-weight: 700;
      color: #7fdbff;
      font-size: 12px;
      text-align: center;
    }
    #mode.focus { color: #ffcc66; }
    #slots {
      flex: 0 0 100%;
      display: flex;
      width: 100%;
    }
    .slot {
      flex: 1 1 0;
      min-width: 140px;
      padding: 6px 8px 8px;
      text-align: center;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }
    .slot:last-of-type { border-right: none; }
    .slot.active { color: #b8f0c8; }
    .slot.focused { color: #ffcc66; font-weight: 700; }
    .slot.idle { opacity: 0.42; }
    .slot-key { display: block; font-size: 10px; color: #c9b8ff; margin-bottom: 2px; }
    .slot-label { display: block; font-size: 11px; }
    #ime {
      flex: 0 0 100%;
      padding: 4px 12px 7px;
      text-align: center;
      font-size: 10px;
      color: #a8d4ff;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    #tile {
      flex: 0 0 100%;
      padding: 0 12px 6px;
      text-align: center;
      font-size: 10px;
      color: #c9b8ff;
    }
  </style>
</head>
<body>
  <div id="bar">
    <div id="mode">—</div>
    <div id="slots"></div>
    <div id="tile">Ctrl+Alt+0: 분할 복귀</div>
    <div id="ime">한/영: Ctrl+Space (fcitx) · VNC에서 안 되면 i7: DISPLAY=:99 fcitx -d</div>
  </div>
  <script>
    const API = 'http://127.0.0.1:__HUMA_PORT__/api/vnc/hud';
    const HINTS = ['Ctrl+Alt+1', 'Ctrl+Alt+2', 'Ctrl+Alt+3', 'Ctrl+Alt+4', 'Ctrl+Alt+5'];
    const SLOT_DESC = ['Crank1(실폰)', 'Crank2(실폰)', '연운1', '연운2', '연운3'];

    async function poll() {
      try {
        const res = await fetch(API, { cache: 'no-store' });
        const d = await res.json();
        const modeEl = document.getElementById('mode');
        modeEl.textContent = d.modeLabel || '—';
        modeEl.className = d.mode === 'focus' ? 'focus' : '';

        const slotsEl = document.getElementById('slots');
        slotsEl.replaceChildren();
        (d.hotkeys || []).forEach((hk, i) => {
          const hint = HINTS[i] ?? `Ctrl+Alt+${hk.id}`;
          const desc = SLOT_DESC[i] ?? hk.label;
          const el = document.createElement('div');
          let cls = 'slot';
          if (hk.active) cls += ' active';
          if (d.focusProxyPort === hk.proxyPort) cls += ' focused';
          if (!hk.active) cls += ' idle';
          el.className = cls;
          el.innerHTML = `<span class="slot-key">${hint}</span><span class="slot-label">${desc}</span>`;
          slotsEl.appendChild(el);
        });
      } catch {
        document.getElementById('mode').textContent = 'HUD 연결 대기…';
      }
      setTimeout(poll, 1200);
    }
    poll();
  </script>
</body>
</html>
