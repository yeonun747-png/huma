<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>HUMA VNC HUD</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: ui-monospace, 'Consolas', monospace;
      user-select: none;
      pointer-events: none;
      overflow: hidden;
    }
    #overlay {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 2147483647;
      max-width: calc(100vw - 16px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 8px;
      background: rgba(8, 6, 14, 0.78);
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
    }
    #bar {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      align-items: center;
      min-height: 44px;
      padding: 6px 12px;
      gap: 0;
      color: #e8e4dc;
      font-size: 14px;
      line-height: 1.2;
      white-space: nowrap;
    }
    .sep {
      flex: 0 0 auto;
      padding: 0 6px;
      color: rgba(255, 255, 255, 0.18);
    }
    #mode {
      flex: 0 0 auto;
      font-weight: 700;
      font-size: 14px;
      color: #7fdbff;
    }
    #mode.focus { color: #ffcc66; }
    #slots {
      flex: 1 1 auto;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      min-width: 0;
      overflow: hidden;
    }
    .slot {
      flex: 0 1 auto;
      padding: 0 8px;
      text-align: center;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
      pointer-events: auto;
      cursor: pointer;
    }
    .slot:hover { background: rgba(255, 255, 255, 0.06); border-radius: 4px; }
    .slot:last-child { border-right: none; }
    .slot.active { color: #b8f0c8; }
    .slot.focused { color: #ffcc66; font-weight: 700; }
    .slot.idle { opacity: 0.42; }
    .slot-key { color: #c9b8ff; margin-right: 4px; }
    #tile {
      flex: 0 0 auto;
      color: #c9b8ff;
      font-size: 13px;
      pointer-events: auto;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    #tile:hover { background: rgba(255, 255, 255, 0.06); }
    #ime-btn {
      flex: 0 0 auto;
      pointer-events: auto;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(127, 219, 255, 0.45);
      background: rgba(20, 40, 60, 0.85);
      color: #a8d4ff;
      margin: 0;
    }
    #ime-btn:hover {
      background: rgba(40, 70, 100, 0.95);
      border-color: rgba(127, 219, 255, 0.75);
    }
    #ime-btn.hangul {
      color: #b8f0c8;
      border-color: rgba(120, 220, 160, 0.55);
      background: rgba(20, 50, 35, 0.9);
    }
    #ime-btn.english {
      color: #ffcc66;
      border-color: rgba(255, 200, 100, 0.45);
    }
    #ime-btn.busy { opacity: 0.55; pointer-events: none; }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="bar">
      <span id="mode">—</span>
      <span class="sep">|</span>
      <div id="slots">
        <div class="slot idle"><span class="slot-key">Ctrl+Alt+1</span><span class="slot-label">Crank1(실폰)</span></div>
        <div class="slot idle"><span class="slot-key">Ctrl+Alt+2</span><span class="slot-label">Crank2(실폰)</span></div>
        <div class="slot idle"><span class="slot-key">Ctrl+Alt+3</span><span class="slot-label">연운1</span></div>
        <div class="slot idle"><span class="slot-key">Ctrl+Alt+4</span><span class="slot-label">연운2</span></div>
        <div class="slot idle"><span class="slot-key">Ctrl+Alt+5</span><span class="slot-label">연운3</span></div>
      </div>
      <span class="sep">|</span>
      <span id="tile">Ctrl+Alt+0 분할</span>
      <span class="sep">|</span>
      <button type="button" id="ime-btn" title="클릭으로 한/영 전환 (VNC 단축키 대체)">한/영 …</button>
    </div>
  </div>
  <script>
    const PORT = '__HUMA_PORT__';
    const API = `http://127.0.0.1:${PORT}/api/vnc/hud`;
    const IME_TOGGLE = `http://127.0.0.1:${PORT}/api/vnc/ime/toggle`;
    const FOCUS = (slot) => `http://127.0.0.1:${PORT}/api/vnc/focus/${slot}`;
    const TILE = `http://127.0.0.1:${PORT}/api/vnc/layout/tile`;
    const HINTS = ['Ctrl+Alt+1', 'Ctrl+Alt+2', 'Ctrl+Alt+3', 'Ctrl+Alt+4', 'Ctrl+Alt+5'];
    const SLOT_DESC = ['Crank1(실폰)', 'Crank2(실폰)', '연운1', '연운2', '연운3'];
    const imeBtn = document.getElementById('ime-btn');
    let imeBusy = false;

    function renderIme(ime) {
      if (!ime) {
        imeBtn.textContent = '한/영 …';
        imeBtn.className = '';
        return;
      }
      const hangul = ime.mode === 'hangul';
      imeBtn.textContent = hangul ? '한글 ▼' : ime.mode === 'english' ? '영문 ▼' : '한/영 ▼';
      imeBtn.className = hangul ? 'hangul' : ime.mode === 'english' ? 'english' : '';
      imeBtn.title = ime.hint || '클릭으로 한/영 전환';
    }

    imeBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (imeBusy) return;
      imeBusy = true;
      imeBtn.classList.add('busy');
      try {
        const res = await fetch(IME_TOGGLE, { method: 'POST', cache: 'no-store' });
        const ime = await res.json();
        renderIme(ime);
      } catch {
        imeBtn.textContent = 'IME 오류';
      } finally {
        imeBusy = false;
        imeBtn.classList.remove('busy');
      }
    });

    document.getElementById('tile').addEventListener('click', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      try {
        await fetch(TILE, { method: 'POST', cache: 'no-store' });
        poll();
      } catch { /* ignore */ }
    });

    async function poll() {
      try {
        const res = await fetch(API, { cache: 'no-store' });
        const d = await res.json();
        const modeEl = document.getElementById('mode');
        modeEl.textContent = d.modeLabel || '—';
        modeEl.className = d.mode === 'focus' ? 'focus' : '';

        const slotsEl = document.getElementById('slots');
        slotsEl.replaceChildren();
        (d.hotkeys || []).forEach((hk, i) => {
          const hint = HINTS[i] ?? `Ctrl+Alt+${hk.id}`;
          const desc = SLOT_DESC[i] ?? hk.label;
          const el = document.createElement('div');
          let cls = 'slot';
          if (hk.active) cls += ' active';
          if (d.focusProxyPort === hk.proxyPort) cls += ' focused';
          if (!hk.active) cls += ' idle';
          el.className = cls;
          el.innerHTML = `<span class="slot-key">${hint}</span><span class="slot-label">${desc}</span>`;
          el.title = hk.active ? `${desc} 클릭 — 전체(포커스)` : `${desc} (세션 없음)`;
          el.addEventListener('click', async (ev) => {
            ev.preventDefault();
            ev.stopPropagation();
            try {
              await fetch(FOCUS(hk.id), { method: 'POST', cache: 'no-store' });
              poll();
            } catch { /* ignore */ }
          });
          slotsEl.appendChild(el);
        });
        renderIme(d.ime);
      } catch {
        document.getElementById('mode').textContent = 'HUD 연결 대기…';
      }
      setTimeout(poll, 1200);
    }
    poll();
  </script>
</body>
</html>
